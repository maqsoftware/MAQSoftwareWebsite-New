<html lang="en">

    <meta charset="UTF-8" />

    <!-- Single Page Apps for GitHub Pages -->
    <!-- MIT License -->
    <!-- https://github.com/rafgraph/spa-github-pages -->
    <!-- This script checks to see if a redirect is present in the query -->
    <!-- string, converts it back into the correct url and adds it to the -->
    <!-- browser's history using window.history.replaceState(...), which -->
    <!-- won't cause the browser to attempt to load the new url. When the -->
    <!-- single page app is loaded further down in this file, the correct -->
    <!-- url will be waiting in the browser's history for the single page -->
    <!-- app to route accordingly. -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
    <link rel="preload" as="image" href="/images/home-hero.webp" fetchpriority="high" />
    <title>MAQ Software — Turn data into decisions faster with AI</title>
    <meta
      name="description"
      content="Microsoft Fabric Featured Partner. 25 years of enterprise delivery. 1,800+ engineers delivering AI, data, and cloud outcomes."
    />

      gtag("js", new Date());
      gtag("config", "G-S0W302CGQG", { send_page_view: false });
