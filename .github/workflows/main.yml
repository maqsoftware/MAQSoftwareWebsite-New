name: Custom deploy

on:
    push:
      branches: ["feature_maq-website-revamp"] # Change if you deploy from another branch
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: false

jobs:
    build:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Set up Node
          uses: actions/setup-node@v4
          with:
            node-version: 22
            cache: npm

        - name: Install dependencies
          run: npm ci

        - name: Build
          run: npm run build -- --base="/${{ github.event.repository.name }}/"

        - name: Upload site
          uses: actions/upload-pages-artifact@v3
          with:
            path: ./dist

    deploy:
      needs: build
      runs-on: ubuntu-latest
      environment:
        name: github-pages # Intentionally no environment URL
      steps:
        - name: Deploy
          uses: actions/deploy-pages@v5
